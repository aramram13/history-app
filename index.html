<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Explorer: The Men Who Built America</title>
    <style>
        /* Gilded Age & Senior-Friendly CSS */
        body {
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
            background-color: #FDFBF7; 
            color: #2C1A0D; 
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background-color: #FFFFFF;
            padding: 45px;
            border-radius: 4px; 
            box-shadow: 0 15px 35px rgba(44, 26, 13, 0.15); 
            border: 4px double #D4AF37; 
            max-width: 900px;
            width: 100%;
        }
        h1 { 
            font-family: 'Georgia', serif;
            font-size: 40px; 
            color: #5E1914; 
            margin-bottom: 30px; 
            border-bottom: 2px solid #D4AF37;
            padding-bottom: 15px;
            letter-spacing: 1px;
        }
        .ornament {
            color: #D4AF37;
            font-size: 24px;
            margin: 0 15px;
            vertical-align: middle;
        }
        p { 
            font-family: 'Arial', sans-serif; 
            font-size: 26px; 
            line-height: 1.7; 
            color: #1A1A1A;
        }
        .btn {
            background-color: #5E1914; 
            color: #FDFBF7; 
            border: 2px solid #D4AF37; 
            border-radius: 4px;
            padding: 20px 30px;
            font-size: 24px;
            font-family: 'Georgia', serif;
            margin: 12px;
            cursor: pointer;
            width: 85%;
            max-width: 600px;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn:hover { 
            background-color: #3E100D; 
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }
        .menu-btn { 
            background-color: #2C1A0D; 
            text-align: left;
            padding-left: 30px;
        }
        .menu-btn:hover { 
            background-color: #1A0F07; 
        }
        .hidden { display: none; }
        iframe { 
            width: 100%; 
            height: 500px; 
            border: 3px solid #2C1A0D; 
            margin-bottom: 25px; 
        }
        #feedback { 
            font-size: 26px; 
            font-weight: bold; 
            margin-top: 25px; 
            min-height: 35px; 
        }
        .progress { 
            font-size: 20px; 
            font-weight: bold;
            color: #8B6508; 
            margin-top: -15px; 
            margin-bottom: 25px; 
            text-transform: uppercase;
            letter-spacing: 2px;
            font-family: 'Georgia', serif;
        }
    </style>
</head>
<body>

<div class="container" id="menuScreen">
    <h1><span class="ornament">&#x269C;</span> Documentary Library <span class="ornament">&#x269C;</span></h1>
    <div id="menuButtons"></div>
</div>

<div class="container hidden" id="videoScreen">
    <h1 id="videoTitle">Episode Title</h1>
    <iframe id="videoPlayer" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>
    <br>
    <button class="btn" onclick="startQuiz()" style="text-align: center; padding-left: 0;">I Finished the Episode
